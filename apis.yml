aid: microsoft-forms
name: Microsoft Forms
description: >-
  Microsoft Forms is a web-based application for creating surveys, quizzes,
  and polls. It provides API access through Microsoft Graph for managing
  forms, retrieving responses, and integrating form functionality into
  custom applications.
type: Index
