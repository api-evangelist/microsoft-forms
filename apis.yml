apis:
  - aid: microsoft-forms:graph-forms-api
    name: Microsoft Graph Forms API
    description: >-
      The Microsoft Graph Forms API provides programmatic access to
      Microsoft Forms for creating and managing forms, surveys, and quizzes.
      Developers can retrieve form definitions, access response data,
      and integrate form functionality into custom applications through
      the Microsoft Graph endpoint.
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/forms-overview
    baseURL: https://graph.microsoft.com/v1.0/
